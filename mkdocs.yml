# My-Mall 文档站
site_name: My-Mall 文档站
site_description: 商城系统（my-mall）项目文档 · 技术选型 / 架构设计 / 开发规范 / 模块设计 / 学习笔记
site_url: https://qihao0o.github.io/my-mall/
repo_url: https://github.com/QiHaoo/my-mall
repo_name: QiHaoo/my-mall
docs_dir: docs
edit_uri: edit/main/docs/

# 主题：Material（移动端自适应、侧边栏导航、全文搜索、代码复制）
theme:
  name: material
  language: zh
  features:
    - navigation.tabs          # 顶部一级分类 Tab
    - navigation.sections      # 侧边栏分组
    - navigation.expand        # 默认展开子项
    - navigation.indexes       # 分组首页
    - navigation.top           # 返回顶部
    - search.suggest           # 搜索联想
    - search.highlight         # 搜索高亮
    - content.code.copy        # 代码块一键复制
    - content.code.annotate    # 代码注释
    - content.tabs.link        # 内容 Tab
    - toc.follow               # 目录跟随滚动
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

# 插件：搜索（支持中文分词）
plugins:
  - search:
      lang:
        - zh
        - en
      # 中文需要按字符切分，否则整段被当成一个 token 无法检索
      separator: '[\s\-\.·、，。：；！？「」『』（）()【】\[\]{}\|/\\]+'

# Markdown 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  # Mermaid 图表渲染：启用后 ```mermaid 代码块自动渲染为流程图/ER图/时序图等
  # Material 主题自动按需注入 Mermaid.js 运行时，支持深浅色主题切换，无需额外安装依赖
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

