server:
  port: 7300

spring:
  application:
    name: mall-oss
  config:
    import:
      - "nacos:mall-oss.yaml?refreshEnabled=true"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataAutoConfiguration
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: my-mall
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: my-mall
        username: nacos
        password: nacos
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mall_oss?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/oss/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# MinIO 配置（默认值，生产环境放 Nacos）
oss:
  minio:
    endpoint: http://127.0.0.1:9000
    # 公网访问基础地址：生产环境配置为 CDN/独立域名（如 https://img.mall.com），避免暴露 MinIO 内网地址；本地留空回退到 endpoint
    public-base-url:
    # Region：MinIO 本地可不填；迁移到 AWS S3 / 阿里云 OSS S3 兼容模式时必填
    region:
    access-key: minioadmin
    secret-key: minioadmin123
  upload:
    # 文件大小上限（字节）
    max-image-size: 10485760      # 图片 10MB
    max-video-size: 524288000     # 视频 500MB
    max-other-size: 52428800      # 其他 50MB
    url-expiry: 300               # Presigned PUT URL 有效期（秒）
    download-expiry: 600          # Presigned GET URL 有效期（秒）
    callback-expiry: 1800         # 上传凭证回调有效期（秒）：超过未回调的 PENDING 记录由定时任务清理
    allowed-buckets:
      - mall-product
      - mall-member
      - mall-comment
      - mall-private
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - video/mp4
      - application/pdf
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document

logging:
  level:
    com.mymall.oss: debug
